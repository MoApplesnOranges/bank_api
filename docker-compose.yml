version: "3.9"

services:
  api:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

# ── Local dev only ────────────────────────────────────────────────────────────
# Run with:  docker compose --profile local up
# This spins up a local MongoDB so you don't need the EC2 instance running.
  mongo:
    image: mongo:7
    container_name: mongo_db
    profiles:
      - local
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
